<div class="card h-100 border-0 shadow apolo-card">

  <div class="position-relative overflow-hidden" style="height: 190px;">
    <img
      [src]="planta().foto"
      class="w-100 h-100 object-fit-cover apolo-card-img"
      [alt]="'Planta ' + planta().id"
    />
    <!-- Degradado sobre imagen -->
    <div class="position-absolute bottom-0 start-0 end-0 h-50"
         style="background: linear-gradient(to top, var(--apolo-bg), transparent);">
    </div>
    <!-- Badge ID -->
    <span class="position-absolute top-0 start-0 m-2 badge bg-dark border border-warning text-warning font-monospace small">
      ID {{ planta().id }}
    </span>
    <!-- Favorito -->
    <span class="position-absolute top-0 end-0 m-2 fs-5 cursor-pointer" [class.text-danger]="planta().favorite" [class.text-secondary]="!planta().favorite"
      (click)="toggleFavorite()">
      {{ planta().favorite ? '♥' : '♡' }}
    </span>
  </div>

  <div class="card-body d-flex flex-column gap-2 p-3">
    <!-- Indicador online -->
    <div class="d-flex align-items-center gap-2">
      <span class="badge bg-success rounded-circle p-1 apolo-pulse"></span>
      <small class="text-success font-monospace">Online</small>
    </div>

    <h5 class="card-title text-white fw-bold mb-0">{{ planta().nombre }}</h5>

    <p class="text-secondary font-monospace small mb-0">
      <i class="bi bi-geo-alt-fill text-warning me-1"></i>
      {{ planta().ubicacion.latitud | number:'1.4-4' }},
      {{ planta().ubicacion.longitud | number:'1.4-4' }}
    </p>

    <a [href]="'#planta/' + planta().id"
       class="btn btn-outline-warning btn-sm mt-auto d-flex justify-content-between align-items-center">
      Ver Detalles
      <i class="bi bi-arrow-right"></i>
    </a>
  </div>

</div>
