<nav class="navbar navbar-dark navbar-expand-lg apolo-navbar">
  <div class="container-fluid px-4">

    <a class="navbar-brand d-flex align-items-center gap-2" [routerLink]="['home']">
      <i class="bi bi-sun-fill text-warning fs-4"></i>
      <span class="text-white fw-bold font-monospace small text-uppercase letter-spacing-wide">
        Proyecto <span class="text-warning">Apolo</span>
      </span>
    </a>

    <ul class="navbar-nav flex-row gap-1 mx-auto">
      <li class="nav-item">
        <a class="nav-link apolo-nav-link px-3 py-2 rounded"
           [routerLink]="['home']" [routerLinkActive]="['apolo-nav-link--active']">
          <i class="bi bi-house me-1"></i>Home
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link apolo-nav-link px-3 py-2 rounded"
           [routerLink]="['plantas']" [routerLinkActive]="['apolo-nav-link--active']">
          <i class="bi bi-grid me-1"></i>Plantas
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link apolo-nav-link px-3 py-2 rounded"
           [routerLink]="['plantasAdministrar']" [routerLinkActive]="['apolo-nav-link--active']">
          <i class="bi bi-table me-1"></i>Administrar
        </a>
      </li>
    </ul>

    <div class="d-flex align-items-center gap-2">

      <div class="input-group input-group-sm apolo-search">
        <input class="form-control form-control-sm bg-transparent text-white border-secondary" type="search" placeholder="Buscar planta..."
          [(ngModel)]="searchString"
          [ngModelOptions]="{standalone: true}"
          (ngModelChange)="search(searchString)"
          />
        <button class="btn btn-outline-warning btn-sm" type="button" (click)="setSearch($event)">
          <i class="bi bi-search"></i>
        </button>
      </div>

      <!-- Separador -->
      <div class="vr bg-secondary opacity-25 mx-1" style="height:24px"></div>

      <span class="text-secondary font-monospace small d-none d-lg-inline">
        <i class="bi bi-person-circle me-1"></i>{{ sesion$ | async }}
      </span>

      <a class="btn btn-outline-secondary btn-sm font-monospace"
         [routerLink]="['login']" [routerLinkActive]="['d-none']">
        <i class="bi bi-box-arrow-in-right me-1"></i>Login
      </a>
      <a class="btn btn-outline-danger btn-sm font-monospace"
         [routerLink]="['home']" (click)="logOut()">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </a>
    </div>
  </div>
</nav>
